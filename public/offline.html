<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>PondSense Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.88), rgba(15, 23, 42, 0.78)),
          url("/laguna-de-bay-enhanced.jpg") center / cover;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        padding: 28px;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      img {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
      }

      h1 {
        margin: 0;
        color: #0f766e;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 10px 0 0;
        color: #475569;
        line-height: 1.55;
      }

      button {
        width: 100%;
        margin-top: 22px;
        border: 0;
        border-radius: 14px;
        background: #0d9488;
        color: white;
        cursor: pointer;
        font-weight: 800;
        padding: 14px 18px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="/pwa-icon-192.png" alt="PondSense logo" />
        <h1>PondSense of Us</h1>
      </div>
      <p>You are offline right now. Reconnect to load live readings, login, SMS alerts, and cloud history.</p>
      <p>Saved pages may still open after the app finishes caching.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
